<template id="prob-0" data-pid="9463" data-title="GCD">
  <h2>9463 — GCD</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB &nbsp;|&nbsp; 4 subtasks</p>
  <p>Given two positive integers <em>a</em> and <em>b</em>, compute their greatest common divisor (GCD) — the largest integer that divides both with no remainder.</p>
  <h3>Input</h3>
  <p>Line 1: integer <em>t</em> (≤ 1000) — number of test cases.<br>
  Next <em>t</em> lines: two positive integers <em>a</em>, <em>b</em>.</p>
  <div class="pv-constraint-box">
    <strong>Subtask constraints:</strong><br>
    Case 1: t ≤ 100, a,b ≤ 100<br>
    Case 2: t ≤ 10 000, a,b ≤ 10 000<br>
    Case 3: t ≤ 20 000, a,b ≤ 100 000<br>
    Case 4: t ≤ 25 000, a,b ≤ 1 000 000
  </div>
  <h3>Output</h3>
  <p>For each test case, print the GCD of <em>a</em> and <em>b</em> on a single line.</p>
  <h3>Sample Input</h3>
  <pre>3
2 4
6 9
10 15</pre>
  <h3>Sample Output</h3>
  <pre>2
3
5</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original', 0, 8); this.blur();">
      Mark as Done
    </button>
  </div>
</template>

<template id="prob-1" data-pid="14151" data-title="Table Management ver.2">
  <h2>14151 — Table Management System ver.2</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 512 MB &nbsp;|&nbsp; 5 subtasks &nbsp;|&nbsp; Partial Judge</p>
  <p>Hodilo is a well-known hot pot restaurant. The restaurant does not accept reservations; guests visit, take a number, and wait. Design a queuing system that assigns tables.</p>
  <p>This is a <strong>partial judge</strong> problem. Implement four functions in <code>function.h</code>:</p>
  <ul>
    <li><code>Table* createTable()</code> — read table count and sizes, allocate and return the Table array.</li>
    <li><code>Guest* createGuest()</code> — read one guest's name, group size, arrival time, and dining time; return a new Guest.</li>
    <li><code>Guest* checkLeave(Table* tables, int tableCount, int currentTime)</code> — return the first guest whose departure time equals <code>currentTime</code>; free that guest and mark the table empty. Return <code>NULL</code> if none.</li>
    <li><code>int assignTable(Table* tables, int tableCount, Guest* guest)</code> — seat the guest at the first empty table with capacity ≥ group size; return the 0-based table index, or <code>-1</code> if none.</li>
  </ul>
  <p>The simulation runs from minute 660 (11:00) to minute 900 (15:00) inclusive, one minute at a time.</p>
  <h3>Input</h3>
  <p>Line 1: N (1 ≤ N ≤ 50) — number of tables.<br>
  Line 2: N integers x<sub>i</sub> (1 ≤ x<sub>i</sub> ≤ 4) — table capacities.<br>
  Line 3: M (1 ≤ M ≤ 50) — number of guests.<br>
  Next M lines: <code>name</code> (≤ 10 chars), <code>group_size</code> (1–4), <code>arrival_time</code> (660–900), <code>dining_time</code> (1–300). Arrivals are in non-decreasing order.</p>
  <h3>Output</h3>
  <p>(Handled by <code>main.c</code>)<br>
  On each enter/leave event: <code>hh:mm (min) -&gt; name: enter/leave</code><br>
  At each full hour: <code>hh:mm (min) -&gt; table: |name(remaining)|...|</code> (empty tables shown as <code>||</code>)</p>
  <h3>Sample Input</h3>
  <pre>3
4 2 3
5
Alice 2 700 100
Mike 4 750 100
Doraemon 3 790 100
Kelvin 2 860 40
Bob 3 820 10</pre>
  <h3>Sample Output</h3>
  <pre>11:00 (660) -> table: ||||
11:40 (700) -> Alice: enter
12:00 (720) -> table: |Alice(80min)|||
13:00 (780) -> table: |Alice(20min)|||
13:20 (800) -> Alice: leave
13:20 (800) -> Mike: enter
13:20 (800) -> Doraemon: enter
14:00 (840) -> table: |Mike(60min)||Doraemon(60min)|
14:20 (860) -> Kelvin: enter
15:00 (900) -> Mike: leave
15:00 (900) -> Kelvin: leave
15:00 (900) -> Doraemon: leave
15:00 (900) -> Bob: enter
15:00 (900) -> table: |Bob(10min)|||</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original', 1, 8); this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-2" data-pid="14900" data-title="Neural Link Node Repair">
  <h2>14900 — Neural Link Node Repair</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB &nbsp;|&nbsp; 7 subtasks</p>
  <p>You are given T neural link nodes. Each node is a 32-bit unsigned integer. Apply the following three rules <strong>in sequence</strong> to each node and output the result.</p>
  <h3>Rule 1 — Overload Detection</h3>
  <p>If any two consecutive bits are both 1 (i.e. <code>S &amp; (S &gt;&gt; 1) != 0</code>), the node is overloaded. Output <code>0xFFFFFFFF</code> and skip Rules 2 and 3.</p>
  <h3>Rule 2 — Neural Bridging</h3>
  <p>Find the highest set bit (MSB) and lowest set bit (LSB) of S. Fill all bits between them with 1s:<br>
  <code>bridge = ((1u &lt;&lt; (msb+1)) - 1) &amp; ~((1u &lt;&lt; lsb) - 1)</code><br>
  If S = 0, output <code>0x00000000</code> and skip Rule 3.</p>
  <h3>Rule 3 — Checksum Integration</h3>
  <p>XOR all four bytes of <code>bridge</code> to form a checksum byte. Replace the lowest byte of <code>bridge</code> with this checksum.</p>
  <h3>Input</h3>
  <p>Line 1: integer T — number of test cases.<br>
  Next T lines: a 32-bit unsigned integer with <code>0x</code> prefix.</p>
  <h3>Output</h3>
  <p>For each test case, output the result as a zero-padded 8-digit uppercase hex value with <code>0x</code> prefix (e.g. <code>0x0A2B4C6D</code>).</p>
  <h3>Sample Input</h3>
  <pre>4
0x00000003
0x00000000
0x00000008
0x08000002</pre>
  <h3>Sample Output</h3>
  <pre>0xFFFFFFFF
0x00000000
0x00000008
0x0FFFFFF1</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original', 2, 8); this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-3" data-pid="14901" data-title="It Is Very Simple">
  <h2>14901 — It Is Very Simple</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB &nbsp;|&nbsp; 8 subtasks</p>
  <p>You are given an initial mysterious string and <em>q</em> queries.</p>
  <h3>Initialization</h3>
  <p>A mysterious string has the format <code>d₁|d₂|...|dₘ</code> where each dᵢ is a decimal integer. To decode it:</p>
  <ol>
    <li>Convert each dᵢ to its uppercase hexadecimal string with <strong>no zero-padding</strong> (e.g. <code>20065</code> → <code>4E61</code>).</li>
    <li>Concatenate all hex strings sequentially to form the working string S.</li>
  </ol>
  <h3>Queries (two types)</h3>
  <ul>
    <li><code>Insert idx str</code> — decode <code>str</code> into hex string S<sub>ins</sub> using the same rules; insert S<sub>ins</sub> into S at position <code>idx</code> (0-indexed, before the character currently there).</li>
    <li><code>Remove idx len</code> — delete exactly <code>len</code> characters from S starting at <code>idx</code>.</li>
  </ul>
  <p>After all queries, decode the final S into ASCII: every consecutive pair of hex digits → one ASCII character (e.g. <code>4E6F</code> → <code>No</code>).</p>
  <h3>Input</h3>
  <p>Line 1: the initial mysterious string.<br>
  Line 2: integer q (1 ≤ q ≤ 100).<br>
  Next q lines: queries as described above.</p>
  <div class="pv-constraint-box">|S| never exceeds 10 000 characters at any point.</div>
  <h3>Output</h3>
  <p>Output the final decoded ASCII string on a single line.</p>
  <h3>Sample Input</h3>
  <pre>20065|16019311|33981975|40140414
3
Insert 6 13183871|30367|126|30359|204916
Remove 3 12
Insert 7 3616|1175|1056</pre>
  <h3>Sample Output</h3>
  <pre>No~~ It is too hard~~</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original', 3, 8); this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-4" data-pid="14903" data-title="NEWater">
  <h2>14903 — NEWater</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB &nbsp;|&nbsp; 7 subtasks</p>
  <p>A billboard system stores text as an array of N strings. Each string i has a length value <code>len[i]</code> specifying how many characters are in it. There are <strong>no null terminators</strong>. All strings are initially empty.</p>
  <p>Process Q queries of these types:</p>
  <ul>
    <li><code>0 i c</code> — append character <code>c</code> to string i.</li>
    <li><code>1 i s</code> — append string <code>s</code> to string i.</li>
    <li><code>2</code> — print all non-empty strings in order (index 0 to N−1), one per line.</li>
  </ul>
  <h3>Input</h3>
  <p>Line 1: two integers N (1 ≤ N ≤ 100) and Q (1 ≤ Q ≤ 1000).<br>
  Next Q lines: queries as described.</p>
  <h3>Output</h3>
  <p>For every type-2 query, print all non-empty strings in index order, each on its own line.</p>
  <h3>Sample Input</h3>
  <pre>3 6
1 2 6KKPba5qeO
0 2 K
1 1 aqnoQc
0 1 6
0 0 a
2</pre>
  <h3>Sample Output</h3>
  <pre>a
aqnoQc6
6KKPba5qeOK</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original', 4, 8); this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-5" data-pid="14904" data-title="Crystalline Spire Energy Harvest">
  <h2>14904 — Crystalline Spire Energy Harvest</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 128 MB &nbsp;|&nbsp; 7 subtasks</p>
  <p>There are N spires in a line. Spire i has height H[i] and broadcasts energy V[i] to its immediate neighbours (left: i−1, right: i+1). A neighbour <strong>absorbs</strong> the energy only if it is <strong>strictly taller</strong> than spire i. Energy from multiple broadcasts accumulates.</p>
  <p>Find the spire that receives the most total absorbed energy. On a tie, output the one with the smaller index (0-indexed).</p>
  <h3>Input</h3>
  <p>Line 1: integer N (1 ≤ N ≤ 5 × 10⁶).<br>
  Next N lines: H[i] (|H[i]| ≤ 2 × 10⁹) and V[i] (0 ≤ V[i] ≤ 10⁹).</p>
  <h3>Output</h3>
  <p>Two space-separated integers: the 0-indexed spire number and the total energy it receives.</p>
  <h3>Sample Input</h3>
  <pre>4
4 2
3 5
6 7
8 4</pre>
  <h3>Sample Output</h3>
  <pre>3 7</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original', 5, 8); this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-6" data-pid="14905" data-title="Check Checkmate">
  <h2>14905 — Check Checkmate</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB &nbsp;|&nbsp; 7 subtasks</p>
  <p>Fujiwara no Sai is analyzing chess puzzles. Determine if the opponent's King can be captured in <strong>2 moves or fewer</strong>.</p>
  <p>Standard 8×8 board, columns A–H, rows 1–8. Piece movement rules:</p>
  <table class="table table-condensed table-bordered" style="max-width:420px;">
    <tr><th>Piece</th><th>Movement</th></tr>
    <tr><td>Q (Queen)</td><td>Any number of squares horizontally, vertically, or diagonally</td></tr>
    <tr><td>R (Rook)</td><td>Any number of squares horizontally or vertically</td></tr>
    <tr><td>N (Knight)</td><td>L-shape: 2 + 1 squares</td></tr>
    <tr><td>B (Bishop)</td><td>Any number of squares diagonally</td></tr>
    <tr><td>P (Pawn)</td><td>Forward one square; captures diagonally; may move two from starting row</td></tr>
    <tr><td>K (King)</td><td>One square in any direction</td></tr>
  </table>
  <h3>Input</h3>
  <p>Line 1: integer t — test cases.<br>
  For each test case:<br>
  &nbsp; Line 1: p — Sai's piece count.<br>
  &nbsp; Next p lines: piece type and position (e.g. <code>Q H1</code>).<br>
  &nbsp; Line: o — opponent's piece count.<br>
  &nbsp; Next o lines: opponent piece type and position.</p>
  <h3>Output</h3>
  <p>For each test case: if the King can be captured in 1 move, print <code>1</code> then the move; in 2 moves, print <code>2</code> then both moves; otherwise print <code>0</code>. Moves are written as <code>start end</code> (e.g. <code>H1 H8</code>).</p>
  <h3>Sample Input</h3>
  <pre>2
8
R A1
R B1
N C1
P D1
B E1
P F1
K G1
Q H1
1
K H8
2
Q G6
K G7
1
K H8</pre>
  <h3>Sample Output</h3>
  <pre>1
H1 H8
2
G6 H6
H6 H8</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original', 6, 8); this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-7" data-pid="14906" data-title="Magical Evaluation">
  <h2>14906 — Magical Evaluation</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB &nbsp;|&nbsp; 7 subtasks &nbsp;|&nbsp; Partial Judge</p>
  <p>n mages are undergoing the First-Class Mage Exam. Each mage has a name and a mana value (−99 to 99). You receive q queries; each specifies a sorting rule. Sort all mages by that rule and output their names.</p>
  <h3>Sorting Rules</h3>
  <table class="table table-condensed table-bordered">
    <tr><th>Rule</th><th>Sort key</th><th>Tiebreaker</th></tr>
    <tr><td>0</td><td><code>value</code> ascending</td><td>Name lexicographically ascending</td></tr>
    <tr><td>1</td><td><code>value²</code> ascending</td><td>Name lexicographically ascending</td></tr>
    <tr><td>2</td><td>Digit sum of <code>|value|</code> ascending (e.g. −85 → 8+5=13)</td><td>Name lex. ascending</td></tr>
    <tr><td>3</td><td>Swap tens and units digits of value, preserve sign, sort ascending (e.g. 78→87, −6→−60, 10→1)</td><td>Name lex. ascending</td></tr>
    <tr><td>4</td><td>Prime |value| first (ascending by original value), non-prime after (also ascending)</td><td>Name lex. ascending</td></tr>
  </table>
  <h3>Input</h3>
  <p>Line 1: n and q (1 ≤ n, q ≤ 100).<br>
  Next n lines: <code>name</code> (≤ 30 chars) and <code>value</code>.<br>
  Next q lines: a rule number (0–4).</p>
  <h3>Output</h3>
  <p>For each query, output sorted names one per line, followed by a blank line.</p>
  <h3>Sample Input</h3>
  <pre>7 5
Frieren 7
Fern -7
Denken 1
Ubel 0
Land -85
Wirbel 7
Kanne 10
0
1
2
3
4</pre>
  <h3>Sample Output</h3>
  <pre>Land
Fern
Ubel
Denken
Frieren
Wirbel
Kanne
(... outputs for rules 1–4 follow)</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original', 7, 8); this.blur();">Mark as Done</button>
  </div>
</template>
