<template id="prob-0" data-pid="9463" data-title="GCD">
  <h2>9463 — GCD</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB</p>
  <p>Given two positive integers <em>a</em> and <em>b</em>, compute their greatest common divisor (GCD) — the largest integer that divides both with no remainder.</p>
  <h3>Input</h3>
  <p>Line 1: integer <em>t</em> — number of test cases.<br>
     Next <em>t</em> lines: two positive integers <em>a</em> and <em>b</em>.</p>
  <h3>Output</h3>
  <p>For each test case, print the GCD on a single line.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>t ≤</th><th>a, b ≤</th></tr>
    <tr><td>1</td><td>25</td><td>100</td><td>100</td></tr>
    <tr><td>2</td><td>25</td><td>10 000</td><td>10 000</td></tr>
    <tr><td>3</td><td>25</td><td>20 000</td><td>100 000</td></tr>
    <tr><td>4</td><td>25</td><td>25 000</td><td>1 000 000</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>3
2 4
6 9
10 15</pre>
  <h3>Sample Output</h3>
  <pre>2
3
5</pre>

<template id="prob-1" data-pid="14151" data-title="Table Management System">
  <h2>14151 — Table Management System</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 512 MB</p>
  <p>Hodilo is a well-known hot pot restaurant. Guests visit, take a number, and wait for a table. Write a complete program that simulates the seating system.</p>
  <p>The simulation runs from <strong>minute 660 (11:00)</strong> to <strong>minute 900 (15:00)</strong> inclusive. At each minute:</p>
  <ol>
    <li>Check for departing guests — if a guest's dining time has expired, they leave and the table becomes empty. Process <strong>all</strong> departures before any arrivals at the same minute.</li>
    <li>Assign newly arrived guests to the <strong>first</strong> empty table whose capacity ≥ their group size. If no suitable table is free, the guest leaves without being seated. Process all guests arriving this minute.</li>
    <li>At minutes 660, 720, 780, 840, and 900, print the table status snapshot.</li>
  </ol>
  <h3>Input</h3>
  <p>Line 1: N (1 ≤ N ≤ 50) — number of tables.<br>
     Line 2: N integers x<sub>i</sub> (1 ≤ x<sub>i</sub> ≤ 4) — capacity of each table.<br>
     Line 3: M (1 ≤ M ≤ 50) — number of guests.<br>
     Next M lines: <code>name</code> (≤ 10 chars), <code>group_size</code> (1–4), <code>arrival_time</code> (660–900), <code>dining_time</code> (1–300). Arrival times are non-decreasing.</p>
  <h3>Output</h3>
  <ul>
    <li>Guest seated: <code>hh:mm (min) -&gt; name: enter</code></li>
    <li>Guest leaves: <code>hh:mm (min) -&gt; name: leave</code></li>
    <li>Snapshot: <code>hh:mm (min) -&gt; table: |name(Xmin)|...|name(Xmin)|</code> (empty table = <code>||</code>)</li>
  </ul>
  <p>At the same minute: departures first → arrivals → snapshot (if applicable).</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>20</td><td>N, M ≤ 5; all guests can always be seated immediately</td></tr>
    <tr><td>2</td><td>20</td><td>N, M ≤ 10; no two guests share the same arrival time</td></tr>
    <tr><td>3</td><td>20</td><td>N, M ≤ 30; guests may arrive at the same minute</td></tr>
    <tr><td>4</td><td>20</td><td>N, M ≤ 50; a guest may arrive when no table is available (they leave immediately)</td></tr>
    <tr><td>5</td><td>20</td><td>Full constraints</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>3
4 2 3
5
Alice 2 700 100
Mike 4 750 100
Doraemon 3 790 100
Kelvin 2 860 40
Bob 3 820 10</pre>
  <h3>Sample Output</h3>
  <pre>11:00 (660) -> table: ||||
11:40 (700) -> Alice: enter
12:00 (720) -> table: |Alice(80min)|||
13:00 (780) -> table: |Alice(20min)|||
13:20 (800) -> Alice: leave
13:20 (800) -> Mike: enter
13:20 (800) -> Doraemon: enter
14:00 (840) -> table: |Mike(60min)||Doraemon(60min)|
14:20 (860) -> Kelvin: enter
15:00 (900) -> Mike: leave
15:00 (900) -> Kelvin: leave
15:00 (900) -> Doraemon: leave
15:00 (900) -> Bob: enter
15:00 (900) -> table: |Bob(10min)|||</pre>

<template id="prob-2" data-pid="14900" data-title="Neural Link Node Repair">
  <h2>14900 — Neural Link Node Repair</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB</p>
  <p>You are given T neural link nodes. Each node is a 32-bit unsigned integer. Apply the following three rules <strong>in sequence</strong> and output the result.</p>
  <h4>Rule 1 — Overload Detection</h4>
  <p>If <code>S &amp; (S &gt;&gt; 1) != 0</code> (two consecutive bits are both 1), output <code>0xFFFFFFFF</code> and skip Rules 2–3.</p>
  <h4>Rule 2 — Neural Bridging</h4>
  <p>Find the highest set bit (MSB) and lowest set bit (LSB). Fill all bits between them with 1s:<br>
  <code>bridge = ((1u &lt;&lt; (msb+1)) - 1) &amp; ~((1u &lt;&lt; lsb) - 1)</code><br>
  If S = 0, output <code>0x00000000</code> and skip Rule 3.</p>
  <h4>Rule 3 — Checksum Integration</h4>
  <p>XOR all four bytes of <code>bridge</code> into a checksum byte. Replace the lowest byte of <code>bridge</code> with this checksum.</p>
  <h3>Input</h3>
  <p>Line 1: T. Next T lines: a 32-bit unsigned integer with <code>0x</code> prefix.</p>
  <h3>Output</h3>
  <p>Zero-padded 8-digit uppercase hex with <code>0x</code> prefix (e.g. <code>0x0A2B4C6D</code>).</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>15</td><td>T ≤ 10; all inputs trigger Rule 1 or are zero</td></tr>
    <tr><td>2</td><td>15</td><td>T ≤ 100; single set bit (MSB = LSB); no Rule 1 triggers</td></tr>
    <tr><td>3</td><td>20</td><td>T ≤ 1 000; no Rule 1 triggers</td></tr>
    <tr><td>4</td><td>25</td><td>T ≤ 10 000; all three rule paths</td></tr>
    <tr><td>5</td><td>25</td><td>T ≤ 100 000; full constraints</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>4
0x00000003
0x00000000
0x00000008
0x08000002</pre>
  <h3>Sample Output</h3>
  <pre>0xFFFFFFFF
0x00000000
0x00000008
0x0FFFFFF1</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original',2,8);this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-3" data-pid="14901" data-title="It Is Very Simple">
  <h2>14901 — It Is Very Simple</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB</p>
  <p>You are given an initial mysterious string and q queries.</p>
  <h4>Initialization</h4>
  <p>A mysterious string has format <code>d₁|d₂|...|dₘ</code> (decimal integers). Decode it by:<br>
  1. Converting each dᵢ to uppercase hex with <strong>no zero-padding</strong> (e.g. <code>20065</code> → <code>4E61</code>).<br>
  2. Concatenating all hex strings to form working string S.</p>
  <h4>Queries</h4>
  <ul>
    <li><code>Insert idx str</code> — decode <code>str</code> the same way; insert the result into S at position <code>idx</code> (0-indexed, before the character currently there).</li>
    <li><code>Remove idx len</code> — delete <code>len</code> characters from S starting at <code>idx</code>.</li>
  </ul>
  <p>After all queries, decode the final S to ASCII: every consecutive hex pair → one character (e.g. <code>4E6F</code> → <code>No</code>).</p>
  <h3>Input</h3>
  <p>Line 1: initial mysterious string.<br>
     Line 2: q (1 ≤ q ≤ 100). Next q lines: queries. |S| ≤ 10 000 at all times.</p>
  <h3>Output</h3>
  <p>Final decoded ASCII string on a single line.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>15</td><td>q ≤ 5; only Insert; each dᵢ ≤ 255</td></tr>
    <tr><td>2</td><td>15</td><td>q ≤ 20; only Remove</td></tr>
    <tr><td>3</td><td>25</td><td>q ≤ 50; both types; each dᵢ ≤ 255 (single byte)</td></tr>
    <tr><td>4</td><td>25</td><td>q ≤ 100; full constraints; |S| ≤ 5 000</td></tr>
    <tr><td>5</td><td>20</td><td>q ≤ 100; |S| ≤ 10 000</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>20065|16019311|33981975|40140414
3
Insert 6 13183871|30367|126|30359|204916
Remove 3 12
Insert 7 3616|1175|1056</pre>
  <h3>Sample Output</h3>
  <pre>No~~ It is too hard~~</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original',3,8);this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-5" data-pid="14904" data-title="Crystalline Spire Energy Harvest">
  <h2>14904 — Crystalline Spire Energy Harvest</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 128 MB</p>
  <p>N spires in a line. Spire i has height H[i] and broadcasts energy V[i] to its immediate neighbours (left: i−1, right: i+1). A neighbour <strong>absorbs</strong> the energy only if it is <strong>strictly taller</strong> than spire i. Energy accumulates.</p>
  <p>Find the spire receiving the most total energy. On a tie, output the one with the smaller index (0-indexed).</p>
  <h3>Input</h3>
  <p>Line 1: N (1 ≤ N ≤ 5 × 10⁶).<br>
     Next N lines: H[i] (|H| ≤ 2×10⁹) and V[i] (0 ≤ V ≤ 10⁹).</p>
  <h3>Output</h3>
  <p>Two space-separated integers: the 0-indexed spire number and its total energy.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>15</td><td>N ≤ 10; all heights distinct and positive</td></tr>
    <tr><td>2</td><td>15</td><td>N ≤ 1 000; heights distinct</td></tr>
    <tr><td>3</td><td>20</td><td>N ≤ 10⁵; heights may be equal</td></tr>
    <tr><td>4</td><td>25</td><td>N ≤ 10⁶; negative heights allowed</td></tr>
    <tr><td>5</td><td>25</td><td>N ≤ 5 × 10⁶; full constraints, time-tight</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>4
4 2
3 5
6 7
8 4</pre>
  <h3>Sample Output</h3>
  <pre>3 7</pre>
  <div class="pv-done-btn">
    <button class="btn btn-success" onclick="toggle_done('original',5,8);this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-6" data-pid="14905" data-title="Check Checkmate">
  <h2>14905 — Check Checkmate</h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB</p>
  <p>Fujiwara no Sai is analyzing chess puzzles. Determine if the opponent's King can be captured in <strong>2 moves or fewer</strong>.</p>
  <p>Standard 8×8 board, columns A–H, rows 1–8.</p>
  <table class="table table-condensed table-bordered pv-rule-table" style="max-width:440px;">
    <tr><th>Piece</th><th>Movement</th></tr>

  <p>If capturable in 1 move: print <code>1</code> then the move. In 2 moves: print <code>2</code> then both moves. Otherwise: <code>0</code>.<br>

  <div id="pv-sidebar"></div>
  <div id="pv-content" style="padding:24px 32px;flex:1;overflow-y:auto;">
    <p class="text-muted" style="margin-top:40px;text-align:center;">Loading…</p>
  </div>
</div>

<script src="./pkg/problem_viewer.js"></script>
<script>
  wasm_bindgen('./pkg/problem_viewer_bg.wasm').then(function() {
    wasm_bindgen.init_viewer('original', 8);
  }).catch(function(e) {
    document.getElementById('pv-content').innerHTML =
      '<div class="alert alert-danger"><strong>WASM failed to load.</strong> ' +
      'Serve over HTTP: <code>python3 -m http.server 8080</code></div>';
  });
  function navigate_to(idx) { wasm_bindgen.navigate_to(idx); }
  function toggle_done(page, idx, n) { wasm_bindgen.toggle_done(page, idx, n); }
  function clear_progress(page, n) { wasm_bindgen.clear_progress(page, n); }
</script>
</body>
</html>
