<template id="prob-0" data-pid="H-1" data-title="GCD+">
  <h2>GCD+ <span class="badge-hard">HARD</span></h2>
  <p class="pv-meta">Time: 2 sec &nbsp;|&nbsp; Memory: 64 MB</p>
  <p>You are given T test cases. In each test case you receive K positive integers. Compute both the <strong>GCD</strong> and <strong>LCM</strong> of all K numbers.</p>
  <h3>Input</h3>
  <p>Line 1: T (1 ≤ T ≤ 100 000).<br>
     Each test case: one line starting with K (2 ≤ K ≤ 20), followed by K positive integers each up to 10<sup>18</sup>.</p>
  <h3>Output</h3>
  <p>Two space-separated values per test case: GCD and LCM.<br>
     If LCM > 10<sup>18</sup>, output <code>overflow</code> instead of the LCM.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>20</td><td>T ≤ 100; K = 2; values ≤ 10⁶</td></tr>
    <tr><td>2</td><td>20</td><td>T ≤ 1 000; K = 2; values ≤ 10¹⁸; LCM never overflows</td></tr>
    <tr><td>3</td><td>20</td><td>T ≤ 10⁴; K ≤ 10; LCM may overflow</td></tr>
    <tr><td>4</td><td>20</td><td>T ≤ 10⁵; K ≤ 20; full constraints</td></tr>
    <tr><td>5</td><td>20</td><td>Same as subtask 4 but time-tight (requires O(K log V) per case)</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>3
2 2 4
3 6 9 12
4 12 15 20 30</pre>
  <h3>Sample Output</h3>
  <pre>2 4
3 36
1 60</pre>
  <div class="pv-done-btn">
    <button class="btn btn-danger" onclick="toggle_done('harder',0,8);this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-1" data-pid="H-2" data-title="Table Management ver.3">
  <h2>Table Management System ver.3 <span class="badge-hard">HARD</span></h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 512 MB</p>
  <p>Same restaurant simulation as the original, but now guests who cannot be immediately seated join a <strong>FIFO waitlist</strong>, and guests may <strong>cancel</strong> their wait.</p>
  <p>Simulation runs from minute 660 to minute 900. At each minute:</p>
  <ol>
    <li>Process departures — free tables, then <strong>immediately and repeatedly</strong> try to seat the front of the waitlist until no more guests can be placed or the list is empty.</li>
    <li>Process new arrivals — try to seat immediately; if no suitable table, add to the back of the waitlist.</li>
    <li>Process cancellations scheduled for this minute — remove those guests from the waitlist (they are never seated).</li>
    <li>Print snapshot at minutes 660, 720, 780, 840, and 900.</li>
  </ol>
  <h3>Input</h3>
  <p>Line 1: N (1 ≤ N ≤ 50) — tables.<br>
     Line 2: N capacities x<sub>i</sub> (1 ≤ x<sub>i</sub> ≤ 4).<br>
     Line 3: M (1 ≤ M ≤ 200) — guests.<br>
     Next M lines: <code>name</code> (≤ 10 chars), <code>group_size</code>, <code>arrival_time</code> (660–900), <code>dining_time</code> (1–300), <code>cancel_time</code> (or <code>-1</code>). Arrivals non-decreasing.</p>
  <h3>Output</h3>
  <p>Same format as the original, plus:<br>
     Seated from waitlist: <code>hh:mm (min) -&gt; name: enter (from waitlist)</code><br>
     Cancellation: <code>hh:mm (min) -&gt; name: cancel</code></p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>20</td><td>N, M ≤ 10; no cancellations; waitlist has at most 1 guest at any time</td></tr>
    <tr><td>2</td><td>20</td><td>N, M ≤ 30; no cancellations; multiple waitlisted guests possible</td></tr>
    <tr><td>3</td><td>20</td><td>N, M ≤ 50; cancellations present; cancelled guest always at front of list</td></tr>
    <tr><td>4</td><td>20</td><td>N ≤ 50; M ≤ 100; cancellations may target any position in the list</td></tr>
    <tr><td>5</td><td>20</td><td>N ≤ 50; M ≤ 200; full constraints</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>2
2 2
4
Alice 2 700 120 -1
Bob 2 710 60 -1
Carol 2 720 30 780
Dave 2 730 60 -1</pre>
  <h3>Sample Output</h3>
  <pre>11:00 (660) -> table: |||
11:40 (700) -> Alice: enter
11:50 (710) -> Bob: enter
12:00 (720) -> table: |Alice(100min)|Bob(50min)|
13:00 (780) -> Bob: leave
13:00 (780) -> Carol: cancel
13:00 (780) -> Dave: enter (from waitlist)
13:00 (780) -> table: |Alice(40min)|Dave(50min)|
14:00 (840) -> Alice: leave
14:00 (840) -> Dave: leave
15:00 (900) -> table: |||</pre>
  <div class="pv-done-btn">
    <button class="btn btn-danger" onclick="toggle_done('harder',1,8);this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-2" data-pid="H-3" data-title="Neural Link Node Repair II">
  <h2>Neural Link Node Repair II <span class="badge-hard">HARD</span></h2>
  <p class="pv-meta">Time: 1 sec &nbsp;|&nbsp; Memory: 32 MB</p>
  <p>Same as the original but each node is a <strong>64-bit unsigned integer</strong> with <strong>four</strong> rules.</p>
  <h4>Rule 1 — Overload Detection</h4>
  <p>If <code>S &amp; (S &gt;&gt; 1) != 0</code>, output <code>0xFFFFFFFFFFFFFFFF</code> and skip the rest.</p>
  <h4>Rule 2 — Neural Bridging</h4>
  <p>Fill all bits between MSB and LSB with 1s. If S = 0, output <code>0x0000000000000000</code> and skip Rules 3–4.</p>
  <h4>Rule 3 — Checksum Integration</h4>
  <p>XOR all <strong>eight</strong> bytes of <code>bridge</code> into a checksum byte. Replace the lowest byte of <code>bridge</code> with this checksum.</p>
  <h4>Rule 4 — Rotation</h4>
  <p>Count the set bits (popcount) of the Rule 3 result. Rotate the result <strong>right</strong> by that many positions (64-bit rotation).</p>
  <h3>Input</h3>
  <p>Line 1: T. Next T lines: a 64-bit unsigned integer in either <strong>decimal</strong> or <strong><code>0x</code>-prefixed hexadecimal</strong>.</p>
  <h3>Output</h3>
  <p>Zero-padded 16-digit uppercase hex with <code>0x</code> prefix.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>15</td><td>All inputs trigger Rule 1 or are zero; decimal only</td></tr>
    <tr><td>2</td><td>15</td><td>No Rule 1 triggers; single set bit; hex only</td></tr>
    <tr><td>3</td><td>20</td><td>All rules; hex only; T ≤ 1 000</td></tr>
    <tr><td>4</td><td>25</td><td>All rules; both decimal and hex; T ≤ 10 000</td></tr>
    <tr><td>5</td><td>25</td><td>Full constraints; T ≤ 100 000</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>4
0x0000000000000003
0x0000000000000000
512
0x0800000000000002</pre>
  <h3>Sample Output</h3>
  <pre>0xFFFFFFFFFFFFFFFF
0x0000000000000000
0x0000000000000200
0x01FFFFFFFFFFFFFF</pre>
  <div class="pv-done-btn">
    <button class="btn btn-danger" onclick="toggle_done('harder',2,8);this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-3" data-pid="H-4" data-title="It Is Not Simple">
  <h2>It Is Not Simple <span class="badge-hard">HARD</span></h2>
  <p class="pv-meta">Time: 2 sec &nbsp;|&nbsp; Memory: 64 MB</p>
  <p>Same mysterious string format and working string S, but with <strong>four</strong> query types.</p>
  <h4>Queries</h4>
  <ul>
    <li><code>Insert idx str</code> — decode <code>str</code> and insert into S at <code>idx</code>.</li>
    <li><code>Remove idx len</code> — delete <code>len</code> characters from S starting at <code>idx</code>.</li>
    <li><code>Reverse idx1 idx2</code> — reverse the substring of S from <code>idx1</code> to <code>idx2</code> inclusive.</li>
    <li><code>Replace old new</code> — replace every non-overlapping occurrence of hex substring <code>old</code> with <code>new</code>, left-to-right. Both are plain hex strings. <code>new</code> may be empty.</li>
  </ul>
  <p>After all queries, decode S to ASCII as before. |S| ≤ 100 000 at all times.</p>
  <h3>Input</h3>
  <p>Line 1: initial mysterious string. Line 2: q (1 ≤ q ≤ 1 000). Next q lines: queries.</p>
  <h3>Output</h3>
  <p>Final decoded ASCII string on a single line.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>15</td><td>q ≤ 20; only Insert and Remove; |S| ≤ 1 000</td></tr>
    <tr><td>2</td><td>20</td><td>q ≤ 100; adds Reverse; |S| ≤ 5 000</td></tr>
    <tr><td>3</td><td>20</td><td>q ≤ 500; adds Replace; |old| = 2 (one byte); |S| ≤ 10 000</td></tr>
    <tr><td>4</td><td>20</td><td>q ≤ 1 000; Replace with arbitrary-length old; |S| ≤ 50 000</td></tr>
    <tr><td>5</td><td>25</td><td>Full constraints; |S| ≤ 100 000; time-tight</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>20065|16019311|33981975|40140414
4
Insert 6 13183871|30367|126|30359|204916
Remove 3 12
Replace 7E 7E7E
Insert 7 3616|1175|1056</pre>
  <h3>Sample Output</h3>
  <pre>No~~~~ It is too hard~~~~</pre>
  <div class="pv-done-btn">
    <button class="btn btn-danger" onclick="toggle_done('harder',3,8);this.blur();">Mark as Done</button>

</template>

<template id="prob-4" data-pid="H-5" data-title="NEWater II">
  <h2>NEWater II <span class="badge-hard">HARD</span></h2>
  <p class="pv-meta">Time: 2 sec &nbsp;|&nbsp; Memory: 128 MB</p>
  <p>Same billboard string array as the original. No null terminators; <code>len[i]</code> is authoritative. All strings initially empty. Total characters ≤ 10⁶ at all times.</p>
  <h4>Queries</h4>
  <ul>
    <li><code>0 i c</code> — append character <code>c</code> to string i.</li>
    <li><code>1 i s</code> — append string <code>s</code> to string i.</li>
    <li><code>2</code> — print all non-empty strings in index order, one per line.</li>
    <li><code>3 i j</code> — swap strings i and j (including their lengths).</li>
    <li><code>4 i k</code> — delete the first k characters of string i. If k ≥ len[i], the string becomes empty.</li>
    <li><code>5 i j s</code> — insert string <code>s</code> into string i at position j (0-indexed, before character j). If j = len[i], equivalent to appending.</li>
  </ul>
  <h3>Input</h3>
  <p>Line 1: N (1 ≤ N ≤ 1 000) and Q (1 ≤ Q ≤ 10 000). Next Q lines: queries. All indices are valid.</p>
  <h3>Output</h3>
  <p>For every type-2 query, print all non-empty strings in index order, one per line.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>15</td><td>N ≤ 10; Q ≤ 100; only types 0–2</td></tr>
    <tr><td>2</td><td>20</td><td>N ≤ 50; Q ≤ 500; adds type-3 (swap)</td></tr>
    <tr><td>3</td><td>20</td><td>N ≤ 100; Q ≤ 1 000; adds type-4 (delete prefix)</td></tr>
    <tr><td>4</td><td>20</td><td>N ≤ 500; Q ≤ 5 000; adds type-5 (insert at position)</td></tr>
    <tr><td>5</td><td>25</td><td>Full constraints</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>3 9
1 2 6KKPba5qeO
0 2 K
1 1 aqnoQc
0 1 6
0 0 a
3 0 2
4 1 3
5 0 1 XY
2</pre>
  <h3>Sample Output</h3>
  <pre>aXY
noQc6
a6KKPba5qeOK</pre>

<template id="prob-5" data-pid="H-6" data-title="Crystalline Spire Energy Harvest II">
  <h2>Crystalline Spire Energy Harvest II <span class="badge-hard">HARD</span></h2>
  <p class="pv-meta">Time: 3 sec &nbsp;|&nbsp; Memory: 256 MB</p>
  <p>There is an N × M 2D grid of spires. Each cell (r, c) broadcasts energy V[r][c] to its four immediate neighbours (up, down, left, right). A neighbour absorbs only if it is <strong>strictly taller</strong>. Energy accumulates.</p>
  <p>You receive Q queries. Each query gives (r, c) and H′. The height is <strong>toggled</strong>: if previously modified, it reverts to the original; otherwise it changes to H′. After each toggle, output the cell (row-major index = r × M + c) receiving the maximum total energy, and the amount. On a tie, output the smaller index.</p>
  <h3>Input</h3>
  <p>Line 1: N, M (1 ≤ N, M ≤ 1 000) and Q (1 ≤ Q ≤ 10 000).<br>
     Next N lines: M pairs H[r][c] (|H| ≤ 2×10⁹) and V[r][c] (0 ≤ V ≤ 10⁹).<br>
     Next Q lines: r, c, H′.</p>
  <h3>Output</h3>
  <p>For each query: row-major index of max-energy cell and its total energy.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>15</td><td>N = 1 (1D); M ≤ 1 000; Q ≤ 100</td></tr>
    <tr><td>2</td><td>20</td><td>N, M ≤ 50; Q ≤ 100; brute-force acceptable</td></tr>
    <tr><td>3</td><td>20</td><td>N, M ≤ 200; Q ≤ 1 000</td></tr>
    <tr><td>4</td><td>25</td><td>N, M ≤ 500; Q ≤ 5 000</td></tr>
    <tr><td>5</td><td>20</td><td>Full constraints; time-tight</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>2 2 2
4 2 3 5
6 7 8 4
0 1 10
0 1 10</pre>
  <h3>Sample Output</h3>
  <pre>2 9
3 7</pre>
  <div class="pv-done-btn">
    <button class="btn btn-danger" onclick="toggle_done('harder',5,8);this.blur();">Mark as Done</button>
  </div>
</template>

<template id="prob-6" data-pid="H-7" data-title="Check Checkmate II">

  <p>Find the <strong>minimum</strong> number of moves. Output <strong>all distinct move sequences</strong> of that minimum length, sorted <strong>lexicographically</strong> (each move = <code>start end</code>). If impossible in 3 moves, output <code>0</code>.</p>

  <p>Same format as the original.</p>
  <h3>Output</h3>
  <p>Line 1: minimum moves n (or <code>0</code>).<br>
     If n &gt; 0: all distinct shortest sequences, n lines each. Separate sequences with a blank line. Sorted lexicographically.</p>

    <tr><td>3</td><td>20</td><td>t ≤ 5; 1–2 moves; multiple sequences; no promotion</td></tr>
    <tr><td>4</td><td>25</td><td>t ≤ 10; 1–3 moves; multiple sequences; no promotion</td></tr>
    <tr><td>5</td><td>20</td><td>t ≤ 10; full constraints including pawn promotion</td></tr>

2

1

<template id="prob-7" data-pid="H-8" data-title="Magical Evaluation II">
  <h2>Magical Evaluation II <span class="badge-hard">HARD</span></h2>
  <p class="pv-meta">Time: 2 sec &nbsp;|&nbsp; Memory: 64 MB</p>
  <p>Same mage exam, but with <strong>8 sorting rules</strong> and <strong>dynamic add/remove</strong> queries.</p>
  <h3>Sorting Rules (0–7)</h3>
  <table class="table table-condensed table-bordered pv-rule-table">
    <tr><th>Rule</th><th>Sort key</th><th>Tiebreaker</th></tr>
    <tr><td>0</td><td><code>value</code> ascending</td><td>Name lex. ascending</td></tr>
    <tr><td>1</td><td><code>value²</code> ascending</td><td>Name lex. ascending</td></tr>
    <tr><td>2</td><td>Digit sum of |value| ascending</td><td>Name lex. ascending</td></tr>
    <tr><td>3</td><td>Swap tens+units digits, preserve sign, ascending</td><td>Name lex. ascending</td></tr>
    <tr><td>4</td><td>Prime |value| first (asc), non-prime after (asc)</td><td>Name lex. ascending</td></tr>
    <tr><td>5</td><td>Count of <em>distinct</em> prime factors of |value| ascending (0 and 1 → 0 factors)</td><td>Name lex. ascending</td></tr>
    <tr><td>6</td><td>Sum of all positive divisors of |value| ascending (0 → 0; 1 → 1)</td><td>Name lex. ascending</td></tr>
    <tr><td>7</td><td>Length of longest non-decreasing subsequence of binary representation of |value|, <strong>descending</strong></td><td>Name lex. ascending</td></tr>
  </table>
  <h3>Query types</h3>
  <ul>
    <li><code>S rule</code> — sort by rule (0–7) and print all names, one per line, then a blank line.</li>
    <li><code>A name value</code> — add a mage to the roster.</li>
    <li><code>D name</code> — remove the mage with that name.</li>
  </ul>
  <h3>Input</h3>
  <p>Line 1: n (1 ≤ n ≤ 1 000) and q (1 ≤ q ≤ 1 000).<br>
     Next n lines: <code>name</code> (≤ 30 chars) and <code>value</code> (−99 to 99).<br>
     Next q lines: queries.</p>
  <h3>Subtasks</h3>
  <table class="table table-condensed table-bordered pv-subtask-table">
    <tr><th>Subtask</th><th>Points</th><th>Constraints</th></tr>
    <tr><td>1</td><td>15</td><td>No A/D queries; only Rules 0–4</td></tr>
    <tr><td>2</td><td>15</td><td>No A/D queries; Rules 0–6</td></tr>
    <tr><td>3</td><td>20</td><td>No A/D queries; all Rules 0–7</td></tr>
    <tr><td>4</td><td>25</td><td>A/D queries present; Rules 0–6; roster never empty</td></tr>
    <tr><td>5</td><td>25</td><td>Full constraints; all Rules 0–7; roster may become empty</td></tr>
  </table>
  <h3>Sample Input</h3>
  <pre>3 5
Frieren 7
Fern -7
Denken 1
S 0
A Ubel 0
S 4
D Frieren
S 1</pre>
  <h3>Sample Output</h3>
  <pre>Fern
Denken
Frieren

Ubel
